<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/bootstrap.css">
  <title>Laboratorio 3</title>
</head>

<body>
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="img/logo.png" alt="FCA" width="40" height="40" class="d-inline-block align-text-top">
        Informática
      </a>
    </div>
  </nav>

  <main>
    <div class="d-flex justify-content-md-center align-items-center vh-100">
      <div class="card p-4 bg-white bg-opacity-75">
        <!-- <img src="img/signIn.png" class="card-img-top img-fluid" style="width:25vw;"> -->

        <div class="card-body">
          <h5 class="card-title">Welcome</h5>

          <div class="alert alert-info" role="alert">
            Llena los datos para registrarte.
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="name@example.com">
          </div>

          <div class="mb-3">
            <label for="userName" class="form-label">Usuario</label>
            <input type="text" class="form-control" id="userName" name="userName" placeholder="elBarto666">
          </div>

          <div class="mb-3">
            <label for="phone" class="form-label">Phone</label>
            <input type="tel" class="form-control" id="phone" name="phone" placeholder="5510101010">
          </div>

          <div class="mb-3">
            <label for="userType" class="form-label">User Type</label>
            <select class="form-select" id="userType" name="userType">
              <option selected disabled>Seleccionar</option>
              <option value="alumno">Alumno</option>
              <option value="profesor">Profesor</option>
              <option value="empleado">Empleado</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password">
          </div>

          <div class="mb-3">
            <label for="passwordRepeat" class="form-label">Repeat password</label>
            <input type="password" class="form-control" id="passwordRepeat" name="passwordRepeat">
          </div>

          <button type="submit" class="btn btn-dark">Sign Up</button>
        </div>
      </div>
    </div>
  </main>

  <script src="js/bootstrap.js"></script>
</body>
</html>
